kind: FlowCollector
apiVersion: flows.netobserv.io/v1beta2
metadata:
  name: cluster
spec:
  agent:
    ebpf:
      sampling: 1
      features:
        - DNSTracking
    type: eBPF
  loki:
    enable: true
    mode: Monolithic
    namespace: netobserv
    monolithic:
      installDemoLoki: true
  processor:
    metrics:
      includeList:
        - namespace_dns_latency_seconds
        - node_dns_latency_seconds
        - workload_dns_latency_seconds
