kind: FlowCollector
apiVersion: flows.netobserv.io/v1beta2
metadata:
  name: cluster
spec:
  agent:
    ebpf:
      sampling: 1
    type: eBPF
  deploymentModel: Direct
  loki:
    enable: true
    mode: Monolithic
    namespace: netobserv
    monolithic:
      installDemoLoki: true
  processor:
    logTypes: All
